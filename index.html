<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Photofolios</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* --- 1. VARIÁVEIS GERAIS (Paleta de Cores) --- */
    :root {
      --bg-top: #141414;
      --bg-bottom: #000000;
      --text-bright: #f2f2f2;
      --text-dim: #8f8f8f;
      --text-faint: #5c5c5c;
      --accent: #b592b8;
      --accent-dim: #7d6482;
    }

    /* --- 2. RESET BÁSICO (Remove margens padrão do navegador) --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      /* Fundo com gradiente escuro e fixo */
      background: radial-gradient(circle at 20% 0%, #262626 0%, transparent 45%),
                  linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 55%);
      background-attachment: fixed;
      font-family: "Geist", sans-serif;
      color: var(--text-bright);
      overflow-x: hidden; /* Evita barra de rolagem horizontal */
    }

    /* --- 3. ESTRUTURA DE TELA (Padrão para Home e Galeria) --- */
    .screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: 20vh 20vw 10vh;
    }

    /* --- 4. ANIMAÇÕES (Keyframes) --- */
    @keyframes fadeInSoft {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulseText {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Elementos invisíveis por padrão para surgirem com a animação */
    .title, .menu-item, .home-footer, .back-btn, .gallery-title, .gallery-sub {
      opacity: 0;
    }

    /* Gatilhos de animação da TELA INICIAL (Home) */
    #home .title { animation: fadeInSoft 3s ease forwards 0.1s; }
    #home .menu-item:nth-child(1) { animation: fadeInSoft 3s ease forwards 0.2s; }
    #home .menu-item:nth-child(2) { animation: fadeInSoft 3s ease forwards 0.4s; }
    #home .menu-item:nth-child(3) { animation: fadeInSoft 3s ease forwards 0.6s; }
    #home .menu-item:nth-child(4) { animation: fadeInSoft 3s ease forwards 0.8s; }
    #home .home-footer { animation: fadeInSoft 3s ease forwards 2s; }

    /* Gatilhos de animação da GALERIA (Ativados via JS com a classe .fade-in) */
    #gallery.fade-in .back-btn { animation: fadeInSoft 3s ease forwards 4s; }
    #gallery.fade-in .gallery-title { animation: fadeInSoft 3s ease forwards 0.1s; }
    #gallery.fade-in .gallery-sub { animation: fadeInSoft 3s ease forwards 1s; }

    /* --- 5. TELA INICIAL (Home) --- */
    #home { display: flex; }

    .title {
      font-size: clamp(2.4rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      background: linear-gradient(90deg, #ffffff 0%, #969595 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6vh;
      user-select: none;
    }

    nav.menu {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-item {
      cursor: pointer;
      background: none;
      border: none;
      font-size: clamp(1.2rem, 4vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: fit-content;
      transition: transform .35s ease;
      background: linear-gradient(90deg, #D4D2D2 0%, #ffffff 50%, #969595 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .menu-item:hover { transform: translateX(4px); }

    /* Estilo especial para o menu "Yoná" */
    .menu-item.yona {
      background: linear-gradient(90deg, #D4D2D2 0%, #ffffff 50%, var(--accent-dim) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* --- 6. TELA DA GALERIA (Fotos) --- */
    #gallery { display: none; /* Escondida por padrão */ }

    .back-btn {
      cursor: pointer;
      background: none;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6vh;
      width: fit-content;
      transition: color .3s ease, transform .3s ease;
    }

    .back-btn:hover {
      color: var(--text-bright);
      transform: translateX(-4px);
    }

    .back-btn svg { width: 14px; height: 14px; }
    
    .back-btn-bottom {
      margin-top: 10vh;
      margin-bottom: 0;
      align-self: flex-start;
    }

    .gallery-title {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 1.2rem;
    }

    /* Cores e gradientes dinâmicos para os títulos das galerias */
    .gallery-title.yona-black-white {
      background: linear-gradient(90deg, #7A7A7A 0%, #ffffff 0%, var(--accent) 50%, var(--accent) 100%);
      background-size: 150% 100% !important;
      background-position: 0% center !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      transition: background-position 1s ease-in-out, filter 1s ease;
    }

    .gallery-title.yona-black-white:hover {
      background-position: 100% center !important;
      filter: brightness(1.1);
    }

    .gallery-title.boston,
    .gallery-title.new-york,
    .gallery-title.winter {
      background: linear-gradient(90deg, #ffffff 0%, #7A7A7A 40%, #7A7A7A 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gallery-sub {
      color: var(--text-faint);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 8vh;
      transition: all 0.8s ease-in-out;
      display: inline-block;
      cursor: default;
    }

    .gallery-sub:hover { color: var(--text-bright); }

    /* Grid das Fotos */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 colunas */
      gap: 1.5rem;
    }

    .slot {
      border: 4px solid transparent;
      border-radius: 4px;
      overflow: hidden;
      align-self: start;
      opacity: 0; /* Começa invisível para a animação */
    }

    .slot.fade-in-photo {
      animation: fadeInSoft 8s ease forwards;
      animation-delay: var(--delay, 0s); /* O JS define esse delay dinamicamente */
    }

    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease, filter .4s ease;
      filter: grayscale(0.2);
      cursor: zoom-in;
      /* Bloqueios anti-cópia para as fotos */
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
    }

    .slot:hover img { transform: translateY(-1px) translateX(-1px); }

    /* --- 7. TELA DE ESPERA / SEM FOTOS (Loader) --- */
    .empty-gallery-msg {
      grid-column: 1 / -1; /* Faz ocupar a tela toda no grid */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 10vh 0;
      opacity: 0;
      animation: fadeInSoft 3s ease forwards 4s;
    }

    .loader {
      width: 30px;
      height: 30px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #303030;
      border-radius: 50%;
      animation: spin 8s linear infinite;
    }

    .empty-gallery-msg p {
      background: linear-gradient(90deg, #BFBDBD 0%, #303030 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    /* --- 8. LIGHTBOX (Visualizador de foto grande) --- */
    #lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: default;
      /* Bloqueios anti-cópia */
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      pointer-events: none; /* Toque "atravessa" a imagem */
    }

    .close-lightbox {
      position: absolute;
      top: 3vh;
      right: 5vw;
      color: var(--text-dim);
      font-size: 2.5rem;
      font-weight: 300;
      cursor: pointer;
      transition: color 0.3s;
    }
    .close-lightbox:hover { color: var(--text-bright); }

    /* --- 9. RESPONSIVIDADE (Telas menores de celular) --- */
    @media (max-width: 480px) {
      .screen { 
        padding-top: 8vh; 
        padding-bottom: 5vh; 
      }
      #home {
        padding-left: 15vw;
        padding-right: 15vw;
      }
      #gallery {
        padding-left: 8vw;
        padding-right: 8vw;
      }
      #home-inner { margin-top: 20vh; }
      nav.menu { gap: 1rem; }
      
      .slot img {
        background: rgba(255,255,255,0.015);
      }
    }
  </style>
</head>

<body oncontextmenu="return false;" ondragstart="return false;">

  <main class="screen" id="home">
    <div id="home-inner">
      <h1 class="title">MY PORTRAITS</h1>
      <nav class="menu">
        <button class="menu-item yona" onclick="openGallery(this.textContent)">YONÁ BLACK WHITE</button>
        <button class="menu-item" onclick="openGallery(this.textContent)">BOSTON</button>
        <button class="menu-item" onclick="openGallery(this.textContent)">NEW YORK</button>
        <button class="menu-item" onclick="openGallery(this.textContent)">WINTER</button>
      </nav>
    </div>
  </main>

  <main class="screen" id="gallery">
    <button class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      go back
    </button>
    
    <h2 class="gallery-title" id="gallery-title">Categoria</h2>
    <p class="gallery-sub">Adicione suas fotos a esta série</p>
    
    <div class="grid" id="gallery-grid"></div>

    <button class="back-btn back-btn-bottom" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      go back
    </button>
  </main>

  <div id="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    <img id="lightbox-img" src="" alt="Foto Expandida" onclick="event.stopPropagation()">
  </div>


  <script>
    /* =========================================================
       1. BANCO DE DADOS (Aqui você adiciona/remove as fotos)
       ========================================================= */
    const galleryData = {
      'YONÁ BLACK WHITE': {
        description: 'Reduce to reveal. By stripping away the color and focusing solely on Yona on the sands of Gloucester, the image transcends ordinary photography.',
        images: [
          'images/yona-1.jpg','images/yona-2.jpg','images/yona-3.jpg','images/yona-4.jpg',
          'images/yona-5.jpg','images/yona-6.jpg','images/yona-7.jpg','images/yona-8.jpg',
          'images/yona-9.jpg','images/yona-10.jpg','images/yona-11.jpg','images/yona-12.jpg',
          'images/yona-13.jpg','images/yona-14.jpg','images/yona-15.jpg','images/yona-16.jpg',
          'images/yona-17.jpg','images/yona-18.jpg','images/yona-19.jpg','images/yona-20.jpg'
        ]
      },
      'BOSTON': {
        description: 'Echoes of the past. Exploring the quiet dialogue between historic red bricks and the modern pulse of New England, where every cobblestone tells a story of time.',
        images: [] /* Array vazio mostra o "Coming Soon" */
      },
      'NEW YORK': {
        description: 'Concrete rhythm. Capturing the electric pulse and towering ambition of the streets, where the city’s raw energy transforms the mundane into the cinematic.',
        images: []
      },
      'WINTER': {
        description: 'The art of stillness. Through the lens of the cold, the landscape is stripped to its barest form, revealing the haunting beauty of a world in deep repose.',
        images: []
      }
    };

    /* =========================================================
       2. CONTROLADORES DE TELA (Mudar páginas)
       ========================================================= */
       
    // Função acionada ao clicar em uma categoria no menu
    function openGallery(name) {
      // 2.1 Troca a visualização das telas (Oculta Home, Mostra Galeria)
      document.getElementById('home').style.display = 'none';
      const gallery = document.getElementById('gallery');
      gallery.style.display = 'flex';

      // 2.2 Truque para reiniciar a animação de "fade" (piscar a tela)
      gallery.classList.remove('fade-in');
      void gallery.offsetWidth; 
      gallery.classList.add('fade-in');

      // 2.3 Busca as informações da categoria clicada no nosso "Banco de Dados" acima
      const data = galleryData[name];

      // 2.4 Atualiza o título e ajusta a classe para mudar as cores (via CSS)
      const titleElement = document.getElementById('gallery-title');
      titleElement.textContent = name;
      
      // Converte ex: "YONÁ BLACK WHITE" em "yona-black-white" para o CSS entender
      const cssClassName = name.toLowerCase().replace(/\s+/g, '-').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      titleElement.className = `gallery-title ${cssClassName}`;

      // 2.5 Atualiza o textinho descritivo embaixo do título
      const subElement = document.querySelector('.gallery-sub');
      subElement.textContent = data.description || 'Adicione suas fotos a esta série';

      // 2.6 Limpa as imagens da galeria anterior antes de carregar as novas
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';

      const list = data.images || [];
      const backBtnBottom = document.querySelector('.back-btn-bottom');

      // 2.7 Verifica se tem imagens cadastradas para aquela categoria
      if (list.length === 0) {
        // Se NÃO TIVER fotos, oculta botão de baixo e mostra loader
        if (backBtnBottom) backBtnBottom.style.display = 'none';

        grid.innerHTML = `
          <div class="empty-gallery-msg">
            <div class="loader"></div>
            <p>Coming soon.</p>
          </div>
        `;
      } else {
        // SE TIVER FOTOS, mostra o botão de voltar e desenha as fotos
        if (backBtnBottom) backBtnBottom.style.display = 'inline-flex';

        list.forEach((src, index) => {
          // Cria a "caixa" (slot) e a imagem para o HTML
          const slot = document.createElement('div');
          slot.className = 'slot';
          
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Portrait de ${name}`;
          
          // Quando clicar na foto, abre na tela inteira
          img.onclick = () => openLightbox(src);

          slot.appendChild(img);
          grid.appendChild(slot);

          // Cria um efeito "escadinha" na animação: a foto 2 demora mais que a 1, etc.
          slot.style.setProperty('--delay', `${1 + index * 0.8}s`);
          requestAnimationFrame(() => {
            slot.classList.add('fade-in-photo');
          });
        });
      }

      // 2.8 Sempre que abrir uma nova galeria, joga o usuário lá pro topo da página
      window.scrollTo(0, 0);
    }

    // Função acionada ao clicar em "Go Back"
    function goHome() {
      const gallery = document.getElementById('gallery');
      gallery.style.display = 'none';
      gallery.classList.remove('fade-in');

      document.getElementById('home').style.display = 'flex';
      window.scrollTo(0, 0);
    }

    /* =========================================================
       3. FUNÇÕES DO LIGHTBOX (A Tela Preta com Foto Grande)
       ========================================================= */
       
    // Abre a foto expandida
    function openLightbox(imageSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imageSrc;
      lightbox.style.display = 'flex';
    }

    // Fecha a foto expandida
    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }
  </script>
</body>
</html>
