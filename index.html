<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portraits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ANIMAÇÃO DE ENTRADA SUAVE (SÓ OPACIDADE) */
        @keyframes fadeInSoft {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* estado inicial */
        .title,
        .menu-item,
        .home-footer,
        .back-btn,
        .gallery-title,
        .gallery-sub {
            opacity: 0;
        }

        /* HOME: animação ao carregar */
        .title {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 0.1s;
        }

        nav.menu .menu-item:nth-child(1) {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 0.5s;
        }

        nav.menu .menu-item:nth-child(2) {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 0.8s;
        }

        nav.menu .menu-item:nth-child(3) {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 1.1s;
        }

        nav.menu .menu-item:nth-child(4) {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 1.4s;
        }

        .home-footer {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 2s;
        }

        /* GALERIA: animação quando a classe .fade-in é adicionada */
        #gallery.fade-in .back-btn {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 0.1s;
        }

        #gallery.fade-in .gallery-title {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 0.5s;
        }

        #gallery.fade-in .gallery-sub {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: 0.8s;
        }

        :root {
            --bg-top: #141414;
            --bg-bottom: #000000;
            --text-bright: #f2f2f2;
            --text-dim: #8f8f8f;
            --text-faint: #5c5c5c;
            --accent: #b592b8;
            --accent-dim: #7d6482;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background:
                radial-gradient(circle at 20% 0%, #262626 0%, transparent 45%),
                linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 55%);
            background-attachment: fixed;
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
            color: var(--text-bright);
            overflow-x: hidden;
        }

        .screen {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 25vh 25vw 0vh;
        }

        /* ---------- HOME ---------- */
        #home {
            display: flex;
        }

        .title {
            font-size: clamp(2.1rem, 6vw, 3rem);
            font-weight: 600;
            letter-spacing: 0.03em;
            background: linear-gradient(90deg, #ffffff 0%, #969595 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 9vh;
            user-select: none;
        }

        nav.menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-item {
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            font-size: clamp(1rem, 2.6vw, 1.25rem);
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            width: fit-content;
            position: relative;
            padding: 0 0 2px 0;
            transition: transform .35s ease, opacity .35s ease;
            background: linear-gradient(90deg, #D4D2D2 0%, #ffffff 50%, #969595 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-item:hover,
        .menu-item:focus-visible {
            transform: translateX(4px);
        }

        .menu-item:hover::after,
        .menu-item:focus-visible::after {
            width: 100%;
        }

        .home-footer {
            margin-top: auto;
            padding-top: 6vh;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--text-faint);
            text-transform: uppercase;
        }

        /* ---------- GALLERY VIEW ---------- */
        #gallery {
            display: none;
        }

        .back-btn {
            cursor: pointer;
            background: none;
            border: none;
            outline: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 6vh;
            width: fit-content;
            transition: color .3s ease, transform .3s ease;
        }

        .back-btn:hover {
            color: var(--text-bright);
            transform: translateX(-4px);
        }

        .back-btn svg {
            width: 14px;
            height: 14px;
        }

        .gallery-title {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 600;
            letter-spacing: 0.03em;
            margin-bottom: 0.6rem;
        }

        .gallery-sub {
            color: var(--text-faint);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 5vh;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        /* ---------- SLOTS / FOTOS ---------- */
        .slot {
            border: 1px dashed #3a3a3a;
            border-radius: 2px;
            overflow: hidden;
            transition: border-color .4s ease, background .4s ease;
            cursor: pointer;
            align-self: start;
            opacity: 0;
            /* começa invisível para o fade */
        }

        /* ativa o fade nas fotos, com delay vindo da variável --delay */
        .slot.fade-in-photo {
            animation: fadeInSoft 3s ease forwards;
            animation-delay: var(--delay, 0s);
        }

        /* A imagem dentro do slot */
        .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .4s ease, opacity .4s ease, filter .4s ease;
            filter: grayscale(0.2);
        }

        /* EFEITO AO PASSAR O MOUSE (HOVER) */
        .slot:hover img {
            transform: scale(1.05) translateX(4px);
            opacity: 0.8;
            filter: grayscale(0);
        }

        .slot:hover {
            border-color: var(--text-bright);
            background: rgba(255, 255, 255, 0.05);
        }

        @media (max-width:480px) {
            .screen {
                padding: 8vh 7vw 5vh;
            }

            nav.menu {
                gap: 1.7rem;
            }

            .photo {
                aspect-ratio: 3/4;
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 2px;
                background: rgba(255, 255, 255, 0.015);
                border: 1px solid #3a3a3a;
            }
        }

        /* Estilo do fundo do Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        /* Estilo da imagem expandida */
        #lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            cursor: default;
        }

        /* Botão de fechar (X) */
        .close-lightbox {
            position: absolute;
            top: 3vh;
            right: 5vw;
            color: var(--text-dim);
            font-size: 2.5rem;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-lightbox:hover {
            color: var(--text-bright);
        }
        
        
    </style>


</head>

<body>

    <!-- HOME SCREEN -->
    <div class="screen" id="home">
  <div id="home-inner">
    <h1 class="title">MY PORTRAITS</h1>
    <nav class="menu">
      <button class="menu-item" onclick="openGallery('Yona Black &amp; White')">Yona Black White</button>
      <button class="menu-item" onclick="openGallery('Boston')">Boston</button>
      <button class="menu-item" onclick="openGallery('New York')">New York</button>
      <button class="menu-item" onclick="openGallery('Winter')">Winter</button>
    </nav>
  </div>
  <div class="home-footer">Portfolio &mdash; VITOR ARAUJO</div>
</div>


    <!-- GALLERY SCREEN -->
    <div class="screen" id="gallery">
        <button class="back-btn" onclick="goHome()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Voltar
        </button>
        <h2 class="gallery-title" id="gallery-title">Categoria</h2>
        <p class="gallery-sub">Adicione suas fotos a esta série</p>
        <div class="grid" id="gallery-grid"></div>
    </div>

    <script>
        const photos = {
            'Yona Black & White': [
                // 'images/yona-1.jpg',
            ],
            'Boston': [
                'images/boston-1.png',
                'images/boston-2.png',
                'images/boston-3.png',
            ],
            'New York': [
                // 'images/newyork-1.jpg',
            ],
            'Winter': [
                // 'images/winter-1.jpg',
            ]
        };

        function openGallery(name) {
            document.getElementById('home').style.display = 'none';
            const gallery = document.getElementById('gallery');
            gallery.style.display = 'flex';

            // reinicia a animação dos textos da galeria
            gallery.classList.remove('fade-in');
            void gallery.offsetWidth;
            gallery.classList.add('fade-in');

            const titleElement = document.getElementById('gallery-title');
            titleElement.textContent = name;

            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';

            const categoryName = titleElement.textContent;
            const list = photos[categoryName] || [];

            if (list.length === 0) {
                for (let i = 1; i <= 8; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.textContent = 'Foto ' + i;
                    grid.appendChild(slot);
                }
            } else {
                list.forEach((src, index) => {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.style.padding = '0';
                    slot.style.overflow = 'hidden';

                    const img = document.createElement('img');
                    img.src = src;
                    img.alt = 'Portrait';
                    img.style.cursor = 'zoom-in';
                    img.onclick = function() {
                        openLightbox(src);
                    };

                    slot.appendChild(img);
                    grid.appendChild(slot);

                    // define o delay individual
                    slot.style.setProperty('--delay', `${1 + index * 2}s`);

                    // ativa o fade no frame seguinte
                    requestAnimationFrame(() => {
                        slot.classList.add('fade-in-photo');
                    });
                });


            }

            window.scrollTo(0, 0);
        }

        function goHome() {
            const gallery = document.getElementById('gallery');
            gallery.style.display = 'none';
            gallery.classList.remove('fade-in');

            document.getElementById('home').style.display = 'flex';
            window.scrollTo(0, 0);
        }

        /* --- FUNÇÕES DO LIGHTBOX --- */
        function openLightbox(imageSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');

            lightboxImg.src = imageSrc;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="Foto Expandida" onclick="event.stopPropagation()">
    </div>
</body>

</html>
