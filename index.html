<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portraits</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* =========================================
       1. VARIÁVEIS GERAIS
       ========================================= */
    :root {
      --bg-top: #141414;
      --bg-bottom: #000000;
      --text-bright: #f2f2f2;
      --text-dim: #8f8f8f;
      --text-faint: #5c5c5c;
      --accent: #b592b8;
      --accent-dim: #7d6482;
    }

    /* =========================================
       2. RESET E CONFIGURAÇÕES GERAIS
       ========================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background:
        radial-gradient(circle at 20% 0%, #262626 0%, transparent 45%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 55%);
      background-attachment: fixed;
      font-family: "Geist", sans-serif;
      color: var(--text-bright);
      overflow-x: hidden;
    }

    .screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: 20vh 20vw 10vh;
    }

    /* =========================================
       3. ANIMAÇÕES
       ========================================= */
    @keyframes fadeInSoft {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Oculta os elementos inicialmente para a animação */
    .title, .menu-item, .home-footer, .back-btn, .gallery-title, .gallery-sub {
      opacity: 0;
    }

    /* Gatilhos de animação da HOME */
    #home .title { animation: fadeInSoft 3s ease forwards 0.1s; }
    #home .menu-item:nth-child(1) { animation: fadeInSoft 3s ease forwards 0.5s; }
    #home .menu-item:nth-child(2) { animation: fadeInSoft 3s ease forwards 0.8s; }
    #home .menu-item:nth-child(3) { animation: fadeInSoft 3s ease forwards 1.1s; }
    #home .menu-item:nth-child(4) { animation: fadeInSoft 3s ease forwards 1.4s; }
    #home .home-footer { animation: fadeInSoft 3s ease forwards 2s; }

    /* Gatilhos de animação da GALERIA (ativados via classe .fade-in) */
    #gallery.fade-in .back-btn { animation: fadeInSoft 3s ease forwards 0.1s; }
    #gallery.fade-in .gallery-title { animation: fadeInSoft 3s ease forwards 0.5s; }
    #gallery.fade-in .gallery-sub { animation: fadeInSoft 3s ease forwards 0.8s; }

    /* =========================================
       4. TELA PRINCIPAL (HOME)
       ========================================= */
    #home { display: flex; }

    .title {
      font-size: clamp(2.4rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      background: linear-gradient(90deg, #ffffff 0%, #969595 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6vh;
      user-select: none;
    }

    nav.menu {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-item {
      cursor: pointer;
      background: none;
      border: none;
      font-size: clamp(1.2rem, 4vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      width: fit-content;
      transition: transform .35s ease;
      background: linear-gradient(90deg, #D4D2D2 0%, #ffffff 50%, #969595 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .menu-item:hover { transform: translateX(4px); }

    /* Menu Especial: Yoná */
    .menu-item.yona {
      background: linear-gradient(90deg, #D4D2D2 0%, #ffffff 50%, var(--accent-dim) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .home-footer {
      margin-top: auto;
      padding-top: 6vh;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--text-faint);
      text-transform: uppercase;
    }

    /* =========================================
       5. TELA DE GALERIA
       ========================================= */
    #gallery { display: none; }

    .back-btn {
      cursor: pointer;
      background: none;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6vh;
      width: fit-content;
      transition: color .3s ease, transform .3s ease;
    }

    .back-btn:hover {
      color: var(--text-bright);
      transform: translateX(-4px);
    }

    .back-btn svg {
      width: 14px;
      height: 14px;
    }

    .back-btn-bottom {
      margin-top: 10vh;
      margin-bottom: 0;
      align-self: flex-start;
    }

    .gallery-title {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 3rem;
    }
    

    .gallery-title.yona-black-white {
  /* Criamos um gradiente longo: Cinza -> Roxo -> Roxo */
  /* O roxo começa lá pelos 50% e vai até o final */
  background: linear-gradient(90deg, #7A7A7A 0%, #ffffff 0%, var(--accent) 50%, var(--accent) 100%);
  
  /* Fazemos o fundo ter 300% da largura do título */
  background-size: 150% 100% !important;
  
  /* Posicionamos o fundo no início (onde está o cinza/branco) */
  background-position: 0% center !important;
  
  -webkit-background-clip: text !important;
  background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  
  /* Transição suave para a posição do fundo */
  transition: background-position 1s ease-in-out, filter 1s ease;
}

.gallery-title.yona-black-white:hover {
  /* Ao passar o mouse, movemos o fundo para o final (onde está o roxo) */
  background-position: 100% center !important;
  
  /* Dá um leve brilho extra nas cores */
  filter: brightness(1.1);
}


    /* Cidades e Inverno (Mesmo gradiente, agrupados para evitar repetição) */
    .gallery-title.boston,
    .gallery-title.new-york,
    .gallery-title.winter {
      background: linear-gradient(90deg, #ffffff 0%, #7A7A7A 40%, #7A7A7A 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gallery-sub {
  color: var(--text-faint);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  margin-bottom: 8vh;
  
  /* Preparação para a animação */
  transition: all 0.8s ease-in-out;
  display: inline-block; /* Garante que o efeito de hover foque bem no texto */
  cursor: default;
}

.gallery-sub:hover {
  color: var(--text-bright); /* Acende para o branco/claro */
  
 
}

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    /* Slots de Imagem */
    .slot {
      border: 4px solid transparent;
      border-radius: 4px;
      overflow: hidden;
      align-self: start;
      opacity: 0; 
      padding: 0; /* Removido do JS e trazido pro CSS */
    }

    .slot.fade-in-photo {
      animation: fadeInSoft 2s ease forwards;
      animation-delay: var(--delay, 0s);
    }

    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease, filter .4s ease;
      filter: grayscale(0.2);
      cursor: zoom-in;

      /* ADICIONE ESTAS LINHAS AQUI: */
      -webkit-touch-callout: none !important; /* Bloqueia menu de salvar no iPhone */
      -webkit-user-select: none !important;  /* Bloqueia seleção no Android/Chrome */
      user-select: none !important;
    }

    .slot:hover img {
      transform: translateY(-1px) translateX(-1px);
    }


    /* =========================================
       6. LIGHTBOX (VISUALIZAÇÃO DE IMAGEM)
       ========================================= */
       #lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      cursor: default;

      /* --- ADICIONE ESTAS LINHAS ABAIXO --- */
      -webkit-touch-callout: none !important; /* Bloqueia o menu de salvar no iPhone */
      -webkit-user-select: none !important;  /* Bloqueia seleção no Android/Chrome */
      user-select: none !important;
      pointer-events: none;                   /* Faz o toque "atravessar" a imagem e tocar no fundo */
    }


    .close-lightbox {
      position: absolute;
      top: 3vh;
      right: 5vw;
      color: var(--text-dim);
      font-size: 2.5rem;
      font-weight: 300;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close-lightbox:hover { color: var(--text-bright); }

    /* =========================================
       7. RESPONSIVIDADE (MOBILE)
       ========================================= */
    @media (max-width: 480px) {
      .screen { padding: 8vh 15vw 5vh; }
      #home-inner { margin-top: 20vh; }
      nav.menu { gap: 1.7rem; }
      
      .slot img { /* Ajuste do placeholder no mobile */
        aspect-ratio: 3/4;
        background: rgba(255,255,255,0.015);
        border: 1px solid #3a3a3a;
      }
    }
    
  </style>
</head>

<body>

  <main class="screen" id="home">
    <div id="home-inner">
      <h1 class="title">MY PORTRAITS</h1>
      <nav class="menu">
        <button class="menu-item yona" onclick="openGallery(this.textContent)">YONÁ BLACK WHITE</button>
        <button class="menu-item" onclick="openGallery(this.textContent)">BOSTON</button>
        <button class="menu-item" onclick="openGallery(this.textContent)">NEW YORK</button>
        <button class="menu-item" onclick="openGallery(this.textContent)">WINTER</button>
      </nav>
    </div>
  </main>

  <main class="screen" id="gallery">
    <button class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Voltar
    </button>
    
    <h2 class="gallery-title" id="gallery-title">Categoria</h2>
    <p class="gallery-sub">Adicione suas fotos a esta série</p>
    
    <div class="grid" id="gallery-grid"></div>

    <button class="back-btn back-btn-bottom" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Voltar
    </button>
  </main>

  <div id="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    <img id="lightbox-img" src="" alt="Foto Expandida" onclick="event.stopPropagation()">
  </div>

  <script>
    // 1. DADOS CENTRALIZADOS (Fica muito mais fácil adicionar fotos e textos aqui)
    const galleryData = {
      'YONÁ BLACK WHITE': {
        description: 'Reduce to reveal. By stripping away the color and focusing solely on Yona on the sands of Gloucester, the image transcends ordinary photography.',
        images: ['images/yona-1.jpg','images/yona-2.jpg','images/yona-3.jpg','images/yona-4.jpg','images/yona-5.jpg','images/yona-6.jpg','images/yona-7.jpg','images/yona-8.jpg','images/yona-9.jpg','images/yona-10.jpg','images/yona-11.jpg','images/yona-12.jpg','images/yona-13.jpg','images/yona-14.jpg','images/yona-15.jpg','images/yona-16.jpg','images/yona-17.jpg','images/yona-18.jpg','images/yona-19.jpg','images/yona-20.jpg']
      },
      'BOSTON': {
        description: 'Cenas urbanas e arquitetura da histórica cidade de Boston',
        images: ['images/boston-1.png', 'images/boston-2.png', 'images/boston-3.png']
      },
      'NEW YORK': {
        description: 'A energia vibrante e diversidade das ruas de Nova York',
        images: []
      },
      'WINTER': {
        description: 'Paisagens geladas e a beleza minimalista do inverno',
        images: []
      }
    };

    // 2. FUNÇÃO: ABRIR GALERIA
    function openGallery(name) {
      // Esconde a Home e Mostra a Galeria
      document.getElementById('home').style.display = 'none';
      const gallery = document.getElementById('gallery');
      gallery.style.display = 'flex';

      // Reinicia a animação de entrada da galeria
      gallery.classList.remove('fade-in');
      void gallery.offsetWidth; // Truque do JS para forçar o reflow do navegador
      gallery.classList.add('fade-in');

      // Pega os dados selecionados baseados no nome do botão clicado
      const data = galleryData[name];

      // Atualiza o Título e a Classe (para puxar a cor de gradiente certa do CSS)
      const titleElement = document.getElementById('gallery-title');
      titleElement.textContent = name;
      // Transforma "YONÁ BLACK WHITE" em "yona-black-white" para linkar com o CSS
      const cssClassName = name.toLowerCase().replace(/\s+/g, '-').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      titleElement.className = `gallery-title ${cssClassName}`;

      // Atualiza o Subtítulo
      const subElement = document.querySelector('.gallery-sub');
      subElement.textContent = data.description || 'Adicione suas fotos a esta série';

      // Limpa as imagens antigas do Grid
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';

      const list = data.images || [];

      // Se não houver fotos, gera 8 "slots" vazios para demonstração
      if (list.length === 0) {
        for (let i = 1; i <= 8; i++) {
          const slot = document.createElement('div');
          slot.className = 'slot fade-in-photo'; // Adiciona animação imediata
          slot.textContent = 'Foto ' + i;
          grid.appendChild(slot);
        }
      } else {
        // Renderiza as imagens do banco de dados simulado
        list.forEach((src, index) => {
          const slot = document.createElement('div');
          slot.className = 'slot';
          
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Portrait de ${name}`;
          
          // Adiciona evento de Lightbox ao clicar na imagem
          img.onclick = () => openLightbox(src);

          slot.appendChild(img);
          grid.appendChild(slot);

          // Aplica o atraso escalonado da animação
          slot.style.setProperty('--delay', `${1 + index * 2}s`);
          requestAnimationFrame(() => {
            slot.classList.add('fade-in-photo');
          });
        });
      }

      // Rola a página para o topo suavemente
      window.scrollTo(0, 0);
    }

    // 3. FUNÇÃO: VOLTAR PARA A HOME
    function goHome() {
      const gallery = document.getElementById('gallery');
      gallery.style.display = 'none';
      gallery.classList.remove('fade-in');

      document.getElementById('home').style.display = 'flex';
      window.scrollTo(0, 0);
    }

    // 4. FUNÇÕES: LIGHTBOX (Visualizador de imagens grandes)
    function openLightbox(imageSrc) {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      lightboxImg.src = imageSrc;
      lightbox.style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }
  </script>
<body oncontextmenu="return false;" ondragstart="return false;">
</html>
