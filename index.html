<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>My Photofolios</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@flaticon/flaticon-uicons@3.3.1/css/all/all.min.css">

  <style>
    /* --- 2.1 VARIÁVEIS GERAIS ---
      O :root armazena "apelidos" para cores. 
      Se você quiser mudar a cor roxa (accent) no site todo, 
      basta mudar aqui, e ele atualiza em todos os lugares!
    */
    :root {
      --bg-top: #141414;        /* Cinza bem escuro para o topo do fundo */
      --bg-bottom: #000000;     /* Preto puro para o final do fundo */
      --text-bright: #f2f2f2;   /* Branco quase puro para textos principais */
      --text-dim: #8f8f8f;      /* Cinza médio para textos secundários */
      --text-faint: #5c5c5c;    /* Cinza escuro para detalhes discretos */
      --accent: #b592b8;        /* Roxo claro de destaque */
    }

    /* --- 2.2 RESET BÁSICO ---
      O asterisco (*) seleciona TODOS os elementos do site.
      Zerar margin e padding impede que o navegador coloque espaços indesejados.
      box-sizing: border-box garante que bordas não aumentem o tamanho real dos botões.
    */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

   
    html, body {
  height: 100%;
  background: radial-gradient(circle at 20% 0%, #262626 0%, transparent 75%),
              linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 55%);
              
  background-attachment: fixed;
  font-family: "Geist", sans-serif;
  color: var(--text-bright);
  overflow-x: hidden; 
}

.screen {
  min-height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  padding: 20vh 20vw 10vh;
  position: relative;
  z-index: 0;
}



    /* --- 2.5 MOTOR DE ANIMAÇÕES ---
      @keyframes são roteiros de animação. 
      "fadeInSoft" faz algo ir da invisibilidade (opacity 0) para visível (opacity 1).
      "spin" faz um círculo girar 360 graus.
    */

    @keyframes fadeInSoft {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Deixamos esses elementos invisíveis desde o início. 
      Eles só vão aparecer quando a animação fadeInSoft for chamada neles.
    */
    .title, .menu-item, .home-footer, .back-btn, .gallery-title, .gallery-sub, .share-icon-btn {
      opacity: 0;
    }

    /* --- 2.6 GATILHOS DE ANIMAÇÃO DA HOME ---
      Aqui dizemos QUANDO cada elemento deve aparecer.
      O "0.2s", "0.4s" no final de cada linha é o atraso. 
      Isso cria aquele efeito de escadinha (um botão aparece após o outro).
    */
    #home .title { animation: fadeInSoft 3s ease forwards 0.1s; }
    #home .menu-item:nth-child(1) { animation: fadeInSoft 3s ease forwards 0.2s; }
    #home .menu-item:nth-child(2) { animation: fadeInSoft 3s ease forwards 0.3s; }
    #home .menu-item:nth-child(3) { animation: fadeInSoft 3s ease forwards 0.4s; }
    #home .menu-item:nth-child(4) { animation: fadeInSoft 3s ease forwards 0.5s; }
    #home .share-icon-btn { animation: fadeInSoft 3s ease forwards 0.6s; }

    /* --- 2.7 GATILHOS DE ANIMAÇÃO DA GALERIA ---
      Quando o JS adiciona a classe ".fade-in" no elemento #gallery,
      esses textos começam a surgir suavemente.
    */
    #gallery.fade-in .back-btn { animation: fadeInSoft 1s ease forwards 4s; }
    #gallery.fade-in .gallery-title { animation: fadeInSoft 3s ease forwards 0.1s; }
    #gallery.fade-in .gallery-sub { animation: fadeInSoft 3s ease forwards 0.2s; }


    /* --- 2.8 TEXTOS E BOTÕES DA HOME --- 
    */
    #home { 
      display: flex; /* Garante que a tela inicial esteja visível por padrão */ 
    }

    .title {
      cursor: default;
      font-size: clamp(3rem, 6vw, 3.7rem);
      font-weight: 300;
      background: linear-gradient(90deg, var(--text-bright) 0%, var(--text-faint) 70%);
      background-clip: text;
      color: transparent;
      margin-bottom: 10vh;
      transition: filter .8s ease;
    }
    
    .title:hover { filter: brightness(3);}

    nav.menu {
      border: non;
      display: flex;  /* Flexbox para alinhar os botões em linha */
      flex-direction: column; /* Coloca os botões em coluna (um em cima do outro) */
      gap: 50px; /* Espaçamento entre os botões */
    }

  .menu-item {
    border:none;
    cursor: pointer;
    background: linear-gradient(90deg, var(--text-bright) 0%, var(--text-faint) 50%);
    background-clip: text; /* Faz o fundo do botão ser "recortado" pelo texto */
    color:transparent;
    font-size: clamp(1.2rem, 4vw, 1.4rem); /* Tamanho do texto que se ajusta à tela */
    font-weight: 500; /* Peso da fonte */
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: .5s ease;
    display: flex;    /* Flexbox para alinhar o texto e o ícone */           
    justify-content: space-between; /* Cola os itens nas extremidades da caixa */
    align-items: center;     /* Alinha verticalmente o texto e o ícone */    
  }

  .menu-item.yona {
    background: linear-gradient(90deg, var(--text-bright) 0%, var(--accent) 10%);
    background-size: 150%; /* Esticamos o fundo para ele se mover no hover */
    background-clip: text;
    color: transparent;
    transition: .5s ease-out;
  }

  .menu-item.yona:hover { background-position: 100% center; }

  .menu-item:hover { transform: translateX(4px);}

  .menu-item:active { transform: scale(.9); }

/* --- BOTÃO DE COMPARTILHAR (SÓ ÍCONE NA ESQUERDA) --- */
.share-icon-btn {
  font-size: 1rem;
  letter-spacing: 0.04em;
  font-weight: 400;
  cursor: pointer;
  background-clip: text; /* Faz o fundo do botão ser "recortado" pelo texto */
  color:var(--text-faint);
  border: none;
  margin-left: auto; /* Empurra o botão para a direita */
  margin-top: 8vh; /* Espaço para desgrudar do menu */
  width: fit-content;
  display: flex;
  align-items: center;
  gap: 8px; /* Espaço entre o texto e o ícone */
}







    #gallery { 
      display: none; /* Inicia escondida. O JS vai mudar isso para "flex" ao clicar */
    }

   .back-btn {
  cursor: pointer;
  background: none;
  border: none;
  margin-bottom: 6vh;
  width: fit-content;
  transition: .8s ease;
  display: flex;
  align-items: center;
}

/* Controla o ícone do Flaticon diretamente como texto */
.back-btn i {
  font-size: 1.8rem;          /* Define o tamanho do ícone */
  color: var(--text-faint);   /* Usa a sua cor cinza elegante original */
  transition: transform 0.4s ease, color 0.4s ease;
}

/* Efeito ao passar o mouse */
.back-btn:hover i {
  color: var(--text-bright);  /* Acende para o branco puro do seu tema */
  transform: translateX(-4px); /* Deslocamento sutil para a esquerda */
}

/* Efeito ao clicar */
.back-btn:active i {
  transform: scale(0.9);
}

    .gallery-title {
      cursor:default;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 4vh;
    }

    .gallery-title.yona-black-white {
      background: linear-gradient(90deg, var(--text-bright) 0%, var(--accent) 50%);
      background-size: 150%; /* Esticamos o fundo para ele se mover no hover */
      background-clip: text;
      color: transparent;
      transition: all 1s ease-in-out;
    }

    .gallery-title.yona-black-white:hover {
      background-position: 100% center;
      filter:brightness(1.1);
    }

    .gallery-title.boston,
    .gallery-title.new-york,
    .gallery-title.winter {
       background: linear-gradient(90deg, var(--text-bright) 0%, var(--text-faint) 50%);
       background-clip: text;
       color: transparent;
       transition: filter 1s ease;
    }

    .gallery-title.boston:hover { filter:brightness(2); }
    .gallery-title.new-york:hover { filter:brightness(2); }
    .gallery-title.winter:hover { filter:brightness(2); }

    .gallery-sub {
      cursor: default;
      color: var(--text-faint);
      font-size: clamp(1rem, 1.5vw, 1.5rem);
      letter-spacing: 0.02em;
      margin-bottom: 8vh;
      transition: 0.8s ease;
    }

    .gallery-sub:hover { color:#BFBDBD; } 





    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* Divide o espaço em 2 colunas iguais */
      gap: 1.5rem; /* Espaçamento entre as fotos */
      margin-bottom: 6vh;
    }

    /* A "caixa" invisível que segura a foto */
    .slot {
      border: 4px solid transparent;
      border-radius: 4px;
      overflow: hidden;
      align-self: start;
      opacity: 0; /* Começa invisível para surgir com animação */
      transition: all .5s ease-in-out;
      border-radius: 10px;
    }

    /* O JS adiciona essa classe nas fotos, respeitando o atraso (delay) calculado matematicamente */
    .slot.fade-in-photo {
      animation: fadeInSoft 1s ease forwards;
    }

    /* A Foto de fato */
    .slot img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Faz a foto preencher a caixa sem distorcer (cortando as bordas se necessário) */
      display: block;
      cursor: zoom-in;
      
      /* Bloqueios de segurança: impede arrastar ou pressionar para salvar no celular */
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
    }

    .slot:hover { 
      transform: scale(1.02);
      filter:drop-shadow(1.7);
    }

#lightbox {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.97);
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}

/* quando abrir, só mostra o fundo, sem animação */
#lightbox.aberto {
  display: flex;
}

/* imagem com fade-in quando o lightbox estiver aberto */
#lightbox.aberto #lightbox-img {
  animation: fadeInImg 1s ease forwards;
}

#lightbox-img {
  max-width: 90vw;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  cursor: default;
  -webkit-touch-callout: none !important;
  -webkit-user-select: none !important;
  user-select: none !important;
  pointer-events: none;
}

/* animação só da foto */
@keyframes fadeInImg {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}


    .close-lightbox {
      position: absolute; /* Posição livre, não empurra os outros elementos */
      top: 3vh;
      right: 5vw;
      color: var(--text-dim);
      font-size: 2.5rem;
      cursor: pointer;
    }
    .close-lightbox:hover { color: var(--text-bright);
    transition: .5s ease; }


    /* --- 2.11 TELA "COMING SOON" (Para categorias sem foto) --- 
    */
    .empty-gallery-msg {
      background: linear-gradient(90deg, var(--text-bright) 0%, var(--text-dim) 50%);
      background-clip: text;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: transparent;
      grid-column: 1 / -1; /* Manda a mensagem ignorar as 2 colunas e ocupar o espaço inteiro do grid */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 10vh 0;
      opacity: 0;
      animation: fadeInSoft 3s ease forwards 4s;
    }

    /* O círculo giratório de carregamento */
    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid var(--text-faint);
      border-top: 4px solid var(--accent);
      border-radius: 50%; /* Faz o quadrado virar um círculo perfeito */
      animation: spin 4s linear infinite; /* Chama a animação 'spin' para sempre (infinite) */
    }



    /* --- 2.13 RESPONSIVIDADE (Design para Celulares) --- 
      Esta regra só é ativada se a tela do aparelho tiver no MÁXIMO 480 pixels (celulares).
    */
    @media (max-width: 480px) {
      .screen { 
        padding-top: 8vh; /* Diminui os espaços no celular para caber mais coisas */
        padding-bottom: 5vh; 
      }
      #home {
        padding-left: 15vw; 
        padding-right: 15vw;
      }
      #gallery {
        padding-left: 8vw; /* Margem menor para as fotos ficarem bem grandes */
        padding-right: 8vw;
      }
      #home-inner { margin-top: 10vh; }
      
      nav.menu { gap: 50px; } /* Aproxima os botões do menu */
      
      .slot img {
        background: rgba(255,255,255,0.015); /* Põe um fundinho branco super fraco atrás das fotos para destaque extra */
      }
    }
  </style>
</head>

<body oncontextmenu="return false;" ondragstart="return false;">


  <main class="screen" id="home">
    <div id="home-inner">
      <h1 class="title">MY <br> PORTRAITS</h1>
      
     <nav class="menu">
  <button class="menu-item yona" onclick="openGallery('YONÁ BLACK WHITE')">
    YONÁ BLACK WHITE <i class="fi fi-sr-angle-right"></i>
  </button>
  
  <button class="menu-item" onclick="openGallery('BOSTON')">
    BOSTON <i class="fi fi-sr-angle-right"></i>
  </button>
  
  <button class="menu-item" onclick="openGallery('NEW YORK')">
    NEW YORK <i class="fi fi-sr-angle-right"></i>
  </button>
  
  <button class="menu-item" onclick="openGallery('WINTER')">
    WINTER <i class="fi fi-sr-angle-right"></i>
  </button>

  <button class="share-icon-btn" onclick="shareWebsite()"></button>
</nav>
      
    </div>
  </main>


  <main class="screen" id="gallery">
    
    <button class="back-btn" onclick="goHome()">
     <i class="fi fi-rr-arrow-left"></i>
    </button>
    
    <h2 class="gallery-title" id="gallery-title"></h2>
    <p class="gallery-sub"></p>
    
    <div class="grid" id="gallery-grid"></div>

    <button class="back-btn back-btn-bottom" onclick="goHome()">
     <i class="fi fi-rr-arrow-left"></i>
    </button>
    
  </main>


  <div id="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    
    <img id="lightbox-img" src="" alt="Foto Expandida" onclick="event.stopPropagation()">
  </div>


  <script>
    
    /* --- 4.1 O "BANCO DE DADOS" (Variável constante, não muda) ---
      Aqui guardamos as informações de cada categoria. 
      O formato é um "Objeto" JSON. Se quiser adicionar fotos em Boston, 
      basta colocar os caminhos dentro dos colchetes 'images: []'.
    */
    const galleryData = {
      'YONÁ BLACK WHITE': {
        description: 'Reduce to reveal. By stripping away the color and focusing solely on Yona on the sands of Gloucester, the image transcends ordinary photography.',
        images: [
          'images/yona-1.jpg','images/yona-2.jpg','images/yona-3.jpg','images/yona-4.jpg',
          'images/yona-5.jpg','images/yona-6.jpg','images/yona-7.jpg','images/yona-8.jpg',
          'images/yona-9.jpg','images/yona-10.jpg','images/yona-11.jpg','images/yona-12.jpg',
          'images/yona-13.jpg','images/yona-14.jpg','images/yona-14A.jpg','images/yona-14B.jpg',
          'images/yona-15.jpg','images/yona-16.jpg',
          'images/yona-17.jpg','images/yona-18.jpg','images/yona-19.jpg','images/yona-20.jpg']
      },
      'BOSTON': {
        description: 'Boston in contrast: the taut steel of the Zakim Bridge on one side, a heron among lily pads on the other. Late-afternoon light, silhouettes along the Charles, and a gesture that repeats, the world seen through circles, as if each frame were also about the act of looking. Water, low light, few people. Boston from the side, not head-on.',
        images: ['images/boston-1.png','images/boston-2.png','images/boston-3.png','images/boston-4.png',
                 'images/boston-5.png','images/boston-6.png','images/boston-7.png','images/boston-8.png',
                 'images/boston-9.png','images/boston-10.png','images/boston-11.png','images/boston-12.png'] 
      },
      'NEW YORK': {
        description: 'Concrete rhythm. Capturing the electric pulse and towering ambition of the streets, where the city’s raw energy transforms the mundane into the cinematic.',
        images: []
      },
      'WINTER': {
        description: 'The art of stillness. Through the lens of the cold, the landscape is stripped to its barest form, revealing the haunting beauty of a world in deep repose.',
        images: ['images/winter-1.png','images/winter-2.png','images/winter-3.png','images/winter-4.png',
                 'images/winter-5.png','images/winter-6.png','images/winter-7.png','images/winter-8.png',
                 'images/winter-9.png','images/winter-10.png','images/winter-11.png']
      }
    };


    /* --- 4.2 LÓGICA DE ABRIR A GALERIA ---
      Essa função recebe o "name" (O nome do botão clicado) e faz toda a transformação visual.
    */
    function openGallery(name) {
      
      // A) Esconde a tela principal buscando o id "home" e cortando sua exibição (none)
      document.getElementById('home').style.display = 'none';
      
      // B) Pega a tela de galeria e altera a exibição para "flex", tornando-a visível.
      const gallery = document.getElementById('gallery');
      gallery.style.display = 'flex';

      // C) Truque avançado: Para garantir que as animações reiniciem do zero a cada clique, 
      //    removemos a classe 'fade-in', forçamos o navegador a recalcular a tela, e adicionamos de novo.
      gallery.classList.remove('fade-in');
      void gallery.offsetWidth; 
      gallery.classList.add('fade-in');

      // D) Busca os textos e as fotos dessa categoria no nosso "Banco de Dados"
      const data = galleryData[name];

      // E) Troca o título visual da página pelo nome que veio no botão
      const titleElement = document.getElementById('gallery-title');
      titleElement.textContent = name;
      
      // F) Formata o nome para virar uma classe CSS. 
      // Exemplo: "YONÁ BLACK WHITE" vira "yona-black-white". O CSS vai ler isso e aplicar a cor certa.
      const cssClassName = name.toLowerCase().replace(/\s+/g, '-').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      titleElement.className = `gallery-title ${cssClassName}`;

      // G) Atualiza a frase descritiva abaixo do título.
      const subElement = document.querySelector('.gallery-sub');
      subElement.textContent = data.description || 'Adicione suas fotos a esta série';

      // H) Limpa todas as fotos que estavam na galeria antes (evita duplicar fotos)
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = ''; // Esvazia o conteúdo HTML da div

      // I) Separa a lista de imagens (se não existir, usa uma lista vazia [])
      const list = data.images || [];
      const backBtnBottom = document.querySelector('.back-btn-bottom');

      /* --- MODO MENSAGEM "COMING SOON" --- 
         Se a contagem (length) de fotos for 0...
      */
      if (list.length === 0) {
        // Esconde o botão de voltar do final da página (já que a página não terá rolagem)
        if (backBtnBottom) backBtnBottom.style.display = 'none';

        // Escreve o código HTML da bolinha carregando dentro do Grid Vazio
        grid.innerHTML = `
          <div class="empty-gallery-msg">
            <div class="loader"></div>
            <p>Coming soon.</p>
          </div>
        `;
      } 
      /* --- MODO PREENCHIMENTO DE FOTOS --- 
         Se tiver fotos na lista...
      */
      else {
        // Garante que o botão de voltar inferior vai aparecer
        if (backBtnBottom) backBtnBottom.style.display = 'inline-flex';

        // Para cada (forEach) imagem cadastrada, ele vai rodar esse bloquinho:
        list.forEach((src, index) => {
          
          // 1. Cria uma caixa <div class="slot"> pelo JS
          const slot = document.createElement('div');
          slot.className = 'slot';
          
          // 2. Cria a tag <img src="..." alt="..."> da foto
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Portrait de ${name}`;
          
          // 3. Diz que ao clicar nesta foto exata, deve abrir o visualizador enviando a URL dela
          img.onclick = () => openLightbox(src);

          // 4. Enfia a tag da foto dentro da div "slot", e depois enfia o slot dentro do Grid do site
          slot.appendChild(img);
          grid.appendChild(slot);
          
          // O requestAnimationFrame garante que o navegador só ative a animação quando a foto estiver na tela
          requestAnimationFrame(() => {
            slot.classList.add('fade-in-photo');
          });
        });
      }

      // J) Independente da aba, rola a página de volta pro topo (coordenada 0 de X, 0 de Y)
      window.scrollTo(0, 0);
    }


    /* --- 4.3 LÓGICA DE VOLTAR PARA A HOME ---
    */
    function goHome() {
      // Pega a galeria, esconde ela, e remove a classe de animação
      const gallery = document.getElementById('gallery');
      gallery.style.display = 'none';
      gallery.classList.remove('fade-in');

      // Pega a tela inicial, exibe ela e rola a página pro topo
      document.getElementById('home').style.display = 'flex';
      window.scrollTo(0, 0);
    }


    /* --- 4.4 SISTEMA DE TELA CHEIA (LIGHTBOX) ---
    */
    
function openLightbox(imageSrc) {
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  lightboxImg.src = imageSrc;        // coloca a foto
  lightbox.classList.add('aberto');  // ativa o lightbox (fundo + animação da foto)
}

function closeLightbox() {
  const lightbox = document.getElementById('lightbox');
  lightbox.classList.remove('aberto'); // esconde tudo
}

/* --- 4.5 SISTEMA DE COMPARTILHAMENTO --- */
function shareWebsite() {
  // Os dados que serão compartilhados
  const shareData = {
    title: 'My Photofolios',
    text: 'Confira meu portfólio de fotografia!',
    url: 'https://myphotofolios.com'
  };

  // Verifica se o navegador/dispositivo suporta a função de compartilhamento nativa
  if (navigator.share) {
    navigator.share(shareData)
      .then(() => console.log('Site compartilhado com sucesso!'))
      .catch((error) => console.log('Erro ao compartilhar:', error));
  } else {
    // Plano B: Se o navegador for muito antigo ou não suportar (ex: alguns desktops),
    // ele apenas copia o link automaticamente.
    navigator.clipboard.writeText(shareData.url).then(() => {
      alert('Link copiado para a área de transferência!');
    }).catch((err) => {
      console.error('Falha ao copiar o link: ', err);
    });
  }
}
    
  </script>
</body>
